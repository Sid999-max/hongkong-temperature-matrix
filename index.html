<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hong Kong Temperature Matrix (Last 10 Years)</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h2>Hong Kong Monthly Temperature (Last 10 Years)</h2>

  <div class="controls">
    <button id="toggleBtn">Mode: MAX (Click to switch to MIN)</button>
  </div>

  <div class="layout">
    <div id="chart"></div>
    <div id="legend"></div>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <script src="script.js"></script>
</body>
</html>
